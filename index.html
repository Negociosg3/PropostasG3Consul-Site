<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Propostas G3 Consultoria</title>
  <style>
    :root {
      --ink: #1f2528;
      --muted: #5c686d;
      --line: #d8ddda;
      --paper: #f3f5f1;
      --green: #0e493a;
      --gold: #b9852f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: var(--paper);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.55;
      letter-spacing: 0;
    }

    main {
      width: min(760px, calc(100% - 32px));
      padding: clamp(28px, 6vw, 56px);
      border-top: 6px solid var(--gold);
      background: #fff;
    }

    img {
      width: min(260px, 70vw);
      height: auto;
      display: block;
      margin-bottom: 34px;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }

    h1 {
      margin: 0 0 12px;
      color: var(--green);
      font-size: clamp(2.1rem, 7vw, 4.2rem);
      line-height: 1.02;
    }
  </style>
</head>
<body>
  <main>
    <img src="Logo/1.png" alt="G3 Consultoria">
    <h1>Propostas G3 Consultoria</h1>
    <p>Area de publicacao de propostas comerciais. Acesse a proposta pelo link direto enviado pela equipe G3.</p>
  </main>
</body>
</html>
